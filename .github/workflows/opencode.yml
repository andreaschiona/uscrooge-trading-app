name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.pull_request.pull_request.number }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.event.comment.author_association == 'OWNER' &&
      github.actor == 'andreaschiona' &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Cache opencode
        uses: actions/cache@v4
        with:
          path: |
            ~/.opencode
            ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-v1.15.10
          restore-keys: |
            opencode-${{ runner.os }}-${{ runner.arch }}-

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_TELEMETRY: false
        with:
          model: opencode/kimi-k2.5-free
          share: false