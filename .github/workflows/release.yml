name: Release

on:
  push:
    branches: [main]
    # Evita di avviare il workflow se vengono modificati SOLO questi file
    paths-ignore:
      - '.github/workflows/**'    # Ignora modifiche alle GitHub Actions
      - '.github/dependabot.yml'   # Ignora dipendenze automatiche
      - '*.md'                    # Ignora README e documentazione Markdown
      - '.gitignore'               # Ignora modifiche al gitignore
      - '.idea/**'                 # Ignora file di configurazione di Android Studio / IntelliJ
      - 'gradle.properties'        # Opzionale: ignora se non influisce sul codice
      - 'LICENSE'                  # Ignora file di licenza

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Importante: persist-credentials deve essere true (default) per consentire il push successivo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          # Remove leading spaces
          sed -i 's/^          //' keystore.properties

      - name: Determine bump type from commits
        id: bump_type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, defaulting to PATCH bump"
            echo "type=PATCH" >> "$GITHUB_OUTPUT"
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --format="%s")
            echo "Commits since $LAST_TAG:"
            echo "$COMMITS"

            BUMP="PATCH"
            while IFS= read -r msg; do
              if echo "$msg" | grep -qi "BREAKING CHANGE"; then
                BUMP="MAJOR"
                break
              fi
              if echo "$msg" | grep -qE "^.*!:" || echo "$msg" | grep -qE "^.*\!:"; then
                BUMP="MAJOR"
                break
              fi
            done <<< "$COMMITS"

            if [ "$BUMP" = "PATCH" ]; then
              while IFS= read -r msg; do
                if echo "$msg" | grep -qi "^feat"; then
                  BUMP="MINOR"
                  break
                fi
              done <<< "$COMMITS"
            fi

            echo "type=$BUMP" >> "$GITHUB_OUTPUT"
            echo "Bump type: $BUMP"
          fi

      - name: Increment version
        id: version
        run: |
          # Read current version from gradle.properties
          MAJOR=$(grep '^appVersionMajor=' gradle.properties | sed 's/.*=//')
          MINOR=$(grep '^appVersionMinor=' gradle.properties | sed 's/.*=//')
          PATCH=$(grep '^appVersionPatch=' gradle.properties | sed 's/.*=//')
          CODE=$(grep '^appVersionCode=' gradle.properties | sed 's/.*=//')

          BUMP_TYPE="${{ steps.bump_type.outputs.type }}"

          case "$BUMP_TYPE" in
            MAJOR)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            MINOR)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            *)
              PATCH=$((PATCH + 1))
              ;;
          esac
          NEW_CODE=$((CODE + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${PATCH}"

          # Update gradle.properties
          sed -i "s/^appVersionMajor=.*/appVersionMajor=$MAJOR/" gradle.properties
          sed -i "s/^appVersionMinor=.*/appVersionMinor=$MINOR/" gradle.properties
          sed -i "s/^appVersionPatch=.*/appVersionPatch=$PATCH/" gradle.properties
          sed -i "s/^appVersionCode=.*/appVersionCode=$NEW_CODE/" gradle.properties

          echo "version=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $NEW_NAME (code: $NEW_CODE)"

      - name: Run tests
        id: tests
        run: ./gradlew test
        continue-on-error: true

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        run: |
          gh issue create \
            --title "Tests failed on main (v${{ steps.version.outputs.version }})" \
            --body "Tests failed for commit ${{ github.sha }}. Check [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          # Aggiunto [skip ci] per impedire a questo commit di scatenare un nuovo giro di release
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Tag and create release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            app/build/outputs/apk/release/*.apk \
            --title "Release $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
