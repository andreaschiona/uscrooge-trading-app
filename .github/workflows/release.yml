name: Release

on:
  push:
    branches: [main]
    # Evita di avviare il workflow se vengono modificati SOLO questi file
    paths-ignore:
      - '.github/workflows/**'    # Ignora modifiche alle GitHub Actions
      - '.github/dependabot.yml'   # Ignora dipendenze automatiche
      - '*.md'                    # Ignora README e documentazione Markdown
      - '.gitignore'               # Ignora modifiche al gitignore
      - '.idea/**'                 # Ignora file di configurazione di Android Studio / IntelliJ
      - 'gradle.properties'        # Opzionale: ignora se non influisce sul codice
      - 'LICENSE'                  # Ignora file di licenza

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Importante: persist-credentials deve essere true (default) per consentire il push successivo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          # Remove leading spaces
          sed -i 's/^          //' keystore.properties

      - name: Increment version
        id: version
        run: |
          # Read current version
          CURRENT_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          CURRENT_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]//g')

          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_CODE=$((CURRENT_CODE + 1))

          # Update build.gradle.kts
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$CURRENT_NAME\"/versionName = \"$NEW_NAME\"/" app/build.gradle.kts

          echo "version=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $NEW_NAME (code: $NEW_CODE)"

      - name: Run tests
        id: tests
        run: ./gradlew test
        continue-on-error: true

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        run: |
          gh issue create \
            --title "Tests failed on main (v${{ steps.version.outputs.version }})" \
            --body "Tests failed for commit ${{ github.sha }}. Check [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          # Aggiunto [skip ci] per impedire a questo commit di scatenare un nuovo giro di release
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Tag and create release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            app/build/outputs/apk/release/*.apk \
            --title "Release $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
